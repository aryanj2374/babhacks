<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b5ee8"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <mask id="tm">
      <!-- Show the full ticket rectangle -->
      <rect x="2" y="10" width="28" height="12" rx="2.5" fill="white"/>
      <!-- Cut notch from left side -->
      <circle cx="2" cy="16" r="3.6" fill="black"/>
      <!-- Cut notch from right side -->
      <circle cx="30" cy="16" r="3.6" fill="black"/>
    </mask>
  </defs>

  <!-- Ticket body with notches via mask -->
  <rect x="2" y="10" width="28" height="12" rx="2.5" fill="url(#tg)" mask="url(#tm)"/>

  <!-- Stub tear line: dashed vertical, offset right -->
  <line x1="22" y1="11.4" x2="22" y2="20.6"
        stroke="rgba(255,255,255,0.22)" stroke-width="0.85"
        stroke-dasharray="1.8 1.4" stroke-linecap="round"/>
</svg>
